# Notify the IMporium store to rebuild whenever modules change here.
#
# On every push that touches modules/, this sends a "modules-updated" signal
# to the store repo, which then re-runs build.py in the cloud and redeploys
# GitHub Pages. Result: push a module here -> the store updates on its own.
#
# ── One-time setup ───────────────────────────────────────────────────────
# 1. Create a Personal Access Token that is allowed to trigger the store repo:
#      GitHub -> Settings -> Developer settings -> Personal access tokens.
#      - Classic token: tick the "repo" scope.  (simplest)
#      - OR fine-grained: give it access to ONLY the store repo, with
#        "Contents: Read and write" permission.
# 2. In THIS repo: Settings -> Secrets and variables -> Actions -> New secret
#      Name:  STORE_TRIGGER_TOKEN
#      Value: the token from step 1
# 3. Set STORE_REPO below to your actual store repo (owner/name).

name: Notify IMporium store

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
  workflow_dispatch: {}   # lets you trigger a rebuild manually from the Actions tab

env:
  STORE_REPO: imenemedjaoui/imporium   # <-- change to your store repo (owner/name)

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger store rebuild
        run: |
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.STORE_TRIGGER_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ env.STORE_REPO }}/dispatches" \
            -d '{"event_type":"modules-updated"}'
          echo "Signalled ${{ env.STORE_REPO }} to rebuild."
